<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOS — Johnny Mnemonic Neural Interface</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚡</text></svg>">
    <!-- Three.js loaded via esm.sh in binary-avatar.js — no import map needed -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --green:    #00ff41;
          --green-d:  #00a82a;
          --green-dd: #004d13;
          --cyan:     #00ffff;
          --magenta:  #ff00ff;
          --amber:    #ffbf00;
          --red:      #ff003c;
          --bg:       #020405;
          --panel:    rgba(0, 20, 10, 0.65);
          --border:   rgba(0, 255, 65, 0.25);
          --mono:     'JetBrains Mono', 'Courier New', monospace;
        }

        html, body {
          height: 100%; overflow: hidden;
          background: var(--bg);
          color: var(--green);
          font-family: var(--mono);
          font-size: 12px;
          -webkit-font-smoothing: antialiased;
        }

        /* ── Full-screen avatar canvas ── */
        #avatar-container {
          position: fixed; inset: 0;
          z-index: 0;
        }

        /* ── HUD overlays ── */
        .hud {
          position: fixed; z-index: 10;
          pointer-events: none;
        }
        .hud-interactive { pointer-events: auto; }

        /* ── Top bar ── */
        #top-bar {
          top: 0; left: 0; right: 0;
          display: flex; justify-content: space-between; align-items: center;
          padding: 12px 24px;
          background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
          border-bottom: 1px solid var(--border);
          font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
        }
        #top-bar .logo {
          font-size: 13px; font-weight: 700;
          color: var(--cyan);
          text-shadow: 0 0 12px rgba(0,255,255,0.5);
        }
        .top-stats { display: flex; gap: 24px; }
        .stat-item { display: flex; align-items: center; gap: 6px; }
        .stat-dot {
          width: 6px; height: 6px; border-radius: 50%;
          background: var(--green);
          box-shadow: 0 0 8px var(--green);
          animation: pulse 2s ease-in-out infinite;
        }
        .stat-dot.warn { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
        .stat-dot.error { background: var(--red); box-shadow: 0 0 8px var(--red); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .top-clock { color: var(--cyan); letter-spacing: 0.3em; }

        /* ── Left panel: system telemetry ── */
        #left-panel {
          top: 60px; left: 16px; bottom: 80px;
          width: 220px;
          display: flex; flex-direction: column; gap: 12px;
          font-size: 10px;
        }
        .panel-box {
          background: var(--panel);
          border: 1px solid var(--border);
          border-radius: 4px;
          padding: 12px;
          backdrop-filter: blur(4px);
        }
        .panel-title {
          font-size: 9px; font-weight: 700;
          letter-spacing: 0.3em; text-transform: uppercase;
          color: var(--cyan);
          margin-bottom: 10px;
          border-bottom: 1px solid var(--border);
          padding-bottom: 6px;
        }
        .meter-row {
          display: flex; justify-content: space-between; align-items: center;
          margin-bottom: 6px;
        }
        .meter-label { color: rgba(0,255,65,0.6); }
        .meter-value { color: var(--green); font-weight: 500; }
        .meter-bar {
          width: 100%; height: 3px; margin-top: 2px;
          background: var(--green-dd);
          border-radius: 2px; overflow: hidden;
        }
        .meter-fill {
          height: 100%; background: var(--green);
          box-shadow: 0 0 6px var(--green);
          transition: width 300ms ease;
        }
        .meter-fill.warn { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
        .meter-fill.critical { background: var(--red); box-shadow: 0 0 6px var(--red); }

        /* ── Right panel: avatar state + controls ── */
        #right-panel {
          top: 60px; right: 16px; bottom: 80px;
          width: 260px;
          display: flex; flex-direction: column; gap: 12px;
        }
        .state-row {
          display: flex; justify-content: space-between; align-items: center;
          padding: 4px 0;
        }
        .state-key { color: rgba(0,255,65,0.5); }
        .state-val { color: var(--green); font-weight: 500; }
        .state-val.active { color: var(--cyan); text-shadow: 0 0 6px var(--cyan); }

        /* Palette selector */
        select {
          background: rgba(0,20,10,0.9); color: var(--green);
          border: 1px solid var(--border); border-radius: 3px;
          padding: 4px 8px; font-family: var(--mono); font-size: 10px;
          outline: none; cursor: pointer;
        }
        select:focus { border-color: var(--cyan); }

        button.hud-btn {
          background: rgba(0,20,10,0.9); color: var(--green);
          border: 1px solid var(--border); border-radius: 3px;
          padding: 8px 14px; font-family: var(--mono); font-size: 10px;
          letter-spacing: 0.15em; text-transform: uppercase;
          cursor: pointer; transition: all 0.2s;
        }
        button.hud-btn:hover {
          background: var(--green); color: #000;
          box-shadow: 0 0 14px var(--green);
        }
        button.hud-btn.active {
          background: var(--cyan); color: #000;
          box-shadow: 0 0 14px var(--cyan);
        }

        /* ── Bottom bar: voice + command input ── */
        #bottom-bar {
          bottom: 0; left: 0; right: 0;
          display: flex; align-items: center; gap: 12px;
          padding: 14px 24px;
          background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, transparent 100%);
          border-top: 1px solid var(--border);
        }

        #mic-btn {
          width: 38px; height: 38px; border-radius: 50%;
          background: rgba(0,20,10,0.9);
          border: 2px solid var(--border);
          display: flex; align-items: center; justify-content: center;
          cursor: pointer; transition: all 0.3s; flex-shrink: 0;
          font-size: 16px;
        }
        #mic-btn:hover { border-color: var(--green); box-shadow: 0 0 12px rgba(0,255,65,0.3); }
        #mic-btn.listening {
          border-color: var(--cyan);
          box-shadow: 0 0 20px rgba(0,255,255,0.4);
          animation: pulse 1.2s ease-in-out infinite;
        }

        #voice-status {
          font-size: 10px; color: rgba(0,255,65,0.5);
          letter-spacing: 0.2em; text-transform: uppercase;
          min-width: 100px;
        }

        #command-input {
          flex: 1;
          background: rgba(0,20,10,0.6);
          border: 1px solid var(--border);
          border-radius: 4px;
          padding: 10px 16px;
          color: var(--green);
          font-family: var(--mono); font-size: 12px;
          outline: none;
        }
        #command-input:focus { border-color: var(--cyan); }
        #command-input::placeholder { color: rgba(0,255,65,0.25); }

        #transcript {
          flex: 1;
          font-size: 11px; color: var(--green);
          max-width: 400px;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        #transcript .interim { color: rgba(0,255,65,0.4); font-style: italic; }

        /* ── Center speech bubble ── */
        #speech-bubble {
          top: 50%; left: 50%;
          transform: translate(-50%, 120px);
          max-width: 520px; width: 90%;
          text-align: center;
          padding: 16px 28px;
          background: rgba(0, 10, 5, 0.7);
          border: 1px solid var(--border);
          border-radius: 8px;
          backdrop-filter: blur(6px);
          -webkit-backdrop-filter: blur(6px);
          -webkit-text-stroke: 0.5px var(--green);
          font-size: 14px; line-height: 1.6;
          color: var(--green);
          text-shadow: 0 0 8px rgba(0,255,65,0.3);
          opacity: 0;
          transition: opacity 0.5s ease;
        }
        #speech-bubble.visible { opacity: 1; }

        /* ── Scan line overlay ── */
        .scanline-overlay {
          position: fixed; inset: 0; z-index: 5;
          pointer-events: none;
          background: repeating-linear-gradient(
            0deg,
            transparent 0px,
            transparent 2px,
            rgba(0,0,0,0.06) 2px,
            rgba(0,0,0,0.06) 4px
          );
        }

        /* ── Corner brackets ── */
        .corner-bracket {
          position: fixed; z-index: 6; pointer-events: none;
          width: 30px; height: 30px;
          border: 1px solid var(--green-d);
          opacity: 0.4;
        }
        .cb-tl { top: 6px; left: 6px; border-right: none; border-bottom: none; }
        .cb-tr { top: 6px; right: 6px; border-left: none; border-bottom: none; }
        .cb-bl { bottom: 6px; left: 6px; border-right: none; border-top: none; }
        .cb-br { bottom: 6px; right: 6px; border-left: none; border-top: none; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
          #left-panel { display: none; }
          #right-panel { width: 200px; }
        }
        @media (max-width: 600px) {
          #right-panel { display: none; }
          #speech-bubble { transform: translate(-50%, 80px); }
        }
    </style>
</head>
<body>

<!-- Scanline overlay -->
<div class="scanline-overlay"></div>

<!-- Corner brackets -->
<div class="corner-bracket cb-tl"></div>
<div class="corner-bracket cb-tr"></div>
<div class="corner-bracket cb-bl"></div>
<div class="corner-bracket cb-br"></div>

<!-- Full-screen avatar canvas -->
<div id="avatar-container"></div>

<!-- Speech bubble -->
<div id="speech-bubble" class="hud"></div>

<!-- Top bar HUD -->
<div id="top-bar" class="hud">
    <span class="logo">AIOS // NEURAL INTERFACE</span>
    <div class="top-stats">
        <div class="stat-item">
            <span class="stat-dot" id="dot-system"></span>
            <span>SYSTEM</span>
        </div>
        <div class="stat-item">
            <span class="stat-dot" id="dot-avatar"></span>
            <span>AVATAR</span>
        </div>
        <div class="stat-item">
            <span class="stat-dot" id="dot-tts"></span>
            <span>TTS</span>
        </div>
        <div class="stat-item">
            <span class="stat-dot" id="dot-voice"></span>
            <span>VOICE</span>
        </div>
    </div>
    <span class="top-clock" id="clock">--:--:--</span>
</div>

<!-- Left panel: System telemetry -->
<div id="left-panel" class="hud">
    <div class="panel-box">
        <div class="panel-title">System Telemetry</div>
        <div class="meter-row"><span class="meter-label">CPU</span><span class="meter-value" id="cpu-val">0%</span></div>
        <div class="meter-bar"><div class="meter-fill" id="cpu-bar" style="width:0%"></div></div>

        <div class="meter-row" style="margin-top:8px"><span class="meter-label">Memory</span><span class="meter-value" id="mem-val">0%</span></div>
        <div class="meter-bar"><div class="meter-fill" id="mem-bar" style="width:0%"></div></div>

        <div class="meter-row" style="margin-top:8px"><span class="meter-label">Disk</span><span class="meter-value" id="disk-val">0%</span></div>
        <div class="meter-bar"><div class="meter-fill" id="disk-bar" style="width:0%"></div></div>
    </div>

    <div class="panel-box">
        <div class="panel-title">Network</div>
        <div class="meter-row"><span class="meter-label">WebSocket</span><span class="meter-value" id="ws-status">--</span></div>
        <div class="meter-row"><span class="meter-label">Latency</span><span class="meter-value" id="ws-latency">--</span></div>
    </div>

    <div class="panel-box">
        <div class="panel-title">Activity Log</div>
        <div id="activity-log" style="max-height:180px; overflow-y:auto; font-size:9px; color:rgba(0,255,65,0.5); line-height:1.6;"></div>
    </div>
</div>

<!-- Right panel: Avatar controls -->
<div id="right-panel" class="hud hud-interactive">
    <div class="panel-box">
        <div class="panel-title">Avatar State</div>
        <div class="state-row"><span class="state-key">Activity</span><span class="state-val" id="av-activity">IDLE</span></div>
        <div class="state-row"><span class="state-key">Emotion</span><span class="state-val" id="av-emotion">NEUTRAL</span></div>
        <div class="state-row"><span class="state-key">Volume</span><span class="state-val" id="av-volume">0.00</span></div>
        <div class="state-row"><span class="state-key">Digits</span><span class="state-val" id="av-digits">--</span></div>
    </div>

    <div class="panel-box">
        <div class="panel-title">Controls</div>
        <div style="display:flex; flex-direction:column; gap:8px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span class="state-key">Palette</span>
                <select id="palette-select" onchange="avatar.renderer.setColorPalette(this.value)" oninput="avatar.renderer.setColorPalette(this.value)" name="Board">
                    <option value="matrix">Matrix Green</option>
                    <option value="cyan">Electric Cyan</option>
                    <option value="cyber-magenta">Cyber Magenta</option>
                    <option value="amber">Amber</option>
                    <option value="ice">Ice</option>
                    <option value="red">Alert Red</option>
                </select>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span class="state-key">Activity</span>
                <select 
                    id="activity-select" 
                    onchange="avatar.renderer.setActivity(this.value)" oninput="avatar.renderer.setActivity(this.value)" 
                    name="Activity"
                    style="width:100px"
                        >
                    <option value="idle">Idle</option>
                    <option value="thinking">Thinking</option>
                    <option value="speaking">Speaking</option>
                    <option value="error">Error</option>
                </select>
            </div>
        </div>
    </div>

    <div class="panel-box">
        <div class="panel-title">Quick Actions</div>
        <div style="display:flex; flex-wrap:wrap; gap:6px;">
            <button class="hud-btn" id="btn-demo">Demo</button>
            <button class="hud-btn" id="btn-greet">Greet</button>
            <button class="hud-btn" id="btn-glitch">Glitch</button>
            <button class="hud-btn" id="btn-effects">CRT Off</button>
        </div>
    </div>

    <div class="panel-box">
        <div class="panel-title">Speech Test</div>
        <div style="display:flex; gap:6px;">
            <input type="text" id="speech-text" placeholder="Type to speak..."
                   style="flex:1; background:rgba(0,10,5,0.8); border:1px solid var(--border);
                          border-radius:3px; padding:6px 10px; color:var(--green);
                          font-family:var(--mono); font-size:10px; outline:none;">
            <button class="hud-btn" id="btn-speak">Say</button>
        </div>
    </div>
</div>

<!-- Bottom bar: voice input -->
<div id="bottom-bar" class="hud hud-interactive">
    <div id="mic-btn" title="Toggle voice input">🎤</div>
    <span id="voice-status">Voice off</span>
    <div id="transcript"></div>
    <input type="text" id="command-input" placeholder="> enter command or say 'hey aios'...">
</div>

<!-- ═══ Scripts ═══ -->
<script type="module">
    import { AvatarController } from './avatar-controller.js';

    // ── Globals ──
    window.AIOS = window.AIOS || {};
    let avatar = null;
    let voiceInput = null;

    // ── Clock ──
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent =
            now.toTimeString().slice(0, 8);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── Activity log ──
    function logActivity(msg) {
        const log = document.getElementById('activity-log');
        const ts = new Date().toTimeString().slice(0, 8);
        const line = document.createElement('div');
        line.textContent = `[${ts}] ${msg}`;
        log.appendChild(line);
        log.scrollTop = log.scrollHeight;
        // Keep last 50
        while (log.children.length > 50) log.removeChild(log.firstChild);
    }

    // ── Speech bubble ──
    let speechTimeout = null;
    function showSpeechBubble(text, duration = 6000) {
        const bubble = document.getElementById('speech-bubble');
        bubble.textContent = text;
        bubble.classList.add('visible');
        clearTimeout(speechTimeout);
        speechTimeout = setTimeout(() => bubble.classList.remove('visible'), duration);
    }

    // ── System telemetry polling ──
    async function pollTelemetry() {
        try {
            if (avatar && avatar.ws && avatar.ws.readyState === WebSocket.OPEN) {
                avatar.ws.send(JSON.stringify({ type: 'request_status' }));
            }
        } catch(e) {}
    }
    setInterval(pollTelemetry, 3000);

    function updateTelemetry(status) {
        const cpu = Math.round(status.cpu_usage || 0);
        const mem = Math.round(status.memory_usage || 0);
        const disk = Math.round(status.disk_usage || 0);

        document.getElementById('cpu-val').textContent = cpu + '%';
        document.getElementById('mem-val').textContent = mem + '%';
        document.getElementById('disk-val').textContent = disk + '%';

        const cpuBar = document.getElementById('cpu-bar');
        cpuBar.style.width = cpu + '%';
        cpuBar.className = 'meter-fill' + (cpu > 80 ? ' critical' : cpu > 50 ? ' warn' : '');

        const memBar = document.getElementById('mem-bar');
        memBar.style.width = mem + '%';
        memBar.className = 'meter-fill' + (mem > 85 ? ' critical' : mem > 65 ? ' warn' : '');

        const diskBar = document.getElementById('disk-bar');
        diskBar.style.width = disk + '%';
        diskBar.className = 'meter-fill' + (disk > 90 ? ' critical' : disk > 70 ? ' warn' : '');
    }

    // ── Intercept avatar WebSocket messages for telemetry ──
    const origHandleWS = AvatarController.prototype.handleWebSocketMessage;
    AvatarController.prototype.handleWebSocketMessage = function(data) {
        try {
            const msg = JSON.parse(data);
            if (msg.type === 'system_status' && msg.status) {
                updateTelemetry(msg.status);
            }
        } catch(e) {}
        return origHandleWS.call(this, data);
    };

    // ── Initialize avatar ──
    async function initAvatar() {
        const container = document.getElementById('avatar-container');
        logActivity('Initializing neural interface...');

        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (!gl) throw new Error('WebGL not supported');

            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

            avatar = new AvatarController(container, {
                colorPalette: 'matrix',
                digitCount: isMobile ? 4000 : 8000,
                rainCount: isMobile ? 600 : 1200,
                enableCRT: !isMobile,
                enableChromatic: !isMobile,
                enableBloom: true,
                enableDataRain: true,
                enableHoloScan: true
            });

            window.AIOS.avatar = avatar;

            document.getElementById('dot-avatar').classList.remove('warn', 'error');
            document.getElementById('av-digits').textContent = (isMobile ? 4000 : 8000).toLocaleString();
            logActivity('Avatar renderer online');

            // Monitor WS state
            setInterval(() => {
                const dotTTS = document.getElementById('dot-tts');
                if (avatar.ws && avatar.ws.readyState === WebSocket.OPEN) {
                    document.getElementById('ws-status').textContent = 'OPEN';
                    dotTTS.className = 'stat-dot';
                } else if (avatar.usingFallback) {
                    document.getElementById('ws-status').textContent = 'FALLBACK';
                    dotTTS.className = 'stat-dot warn';
                } else {
                    document.getElementById('ws-status').textContent = 'CLOSED';
                    dotTTS.className = 'stat-dot error';
                }
            }, 2000);

            // Auto greet after 1.5s
            setTimeout(() => {
                speak('Welcome to the AIOS neural interface. I am your AI agent. All systems nominal.', 'happy');
            }, 1500);

        } catch (err) {
            console.error('[AIOS]', err);
            document.getElementById('dot-avatar').classList.add('error');
            logActivity('Avatar init FAILED: ' + err.message);
        }
    }

    // ── Speak helper ──
    async function speak(text, emotion = 'neutral') {
        if (!avatar) return;
        showSpeechBubble(text);
        logActivity('Speaking: ' + text.slice(0, 60) + (text.length > 60 ? '...' : ''));
        document.getElementById('av-activity').textContent = 'SPEAKING';
        document.getElementById('av-activity').classList.add('active');
        await avatar.speak(text, { emotion });
        document.getElementById('av-activity').textContent = 'IDLE';
        document.getElementById('av-activity').classList.remove('active');
    }

    // ── Voice input ──
    async function initVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            document.getElementById('dot-voice').classList.add('warn');
            document.getElementById('voice-status').textContent = 'Not supported';
            logActivity('Voice: Web Speech API not available');
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        let isListening = false;

        const micBtn = document.getElementById('mic-btn');
        const voiceStatus = document.getElementById('voice-status');
        const transcriptEl = document.getElementById('transcript');
        const dotVoice = document.getElementById('dot-voice');

        function startListening() {
            try {
                recognition.start();
                isListening = true;
                micBtn.classList.add('listening');
                voiceStatus.textContent = 'Listening...';
                dotVoice.className = 'stat-dot';
                logActivity('Voice: listening');
            } catch(e) {
                console.warn('[Voice]', e);
            }
        }

        function stopListening() {
            recognition.stop();
            isListening = false;
            micBtn.classList.remove('listening');
            voiceStatus.textContent = 'Voice off';
            dotVoice.className = 'stat-dot warn';
            logActivity('Voice: stopped');
        }

        micBtn.addEventListener('click', () => {
            if (isListening) stopListening();
            else startListening();
        });

        recognition.onresult = (event) => {
            let interim = '';
            let final = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                if (event.results[i].isFinal) {
                    final += event.results[i][0].transcript;
                } else {
                    interim += event.results[i][0].transcript;
                }
            }

            transcriptEl.innerHTML = final
                ? `<span>${final}</span>`
                : `<span class="interim">${interim}</span>`;

            if (final) {
                processVoiceCommand(final.trim());
            }
        };

        recognition.onerror = (event) => {
            if (event.error === 'no-speech' || event.error === 'aborted') return;
            logActivity('Voice error: ' + event.error);
        };

        recognition.onend = () => {
            if (isListening) {
                setTimeout(() => { if (isListening) startListening(); }, 200);
            }
        };

        logActivity('Voice input ready');
    }

    // ── Voice command processing ──
    async function processVoiceCommand(text) {
        const lower = text.toLowerCase();
        logActivity('Voice cmd: ' + text);

        if (/^(hey aios|aios|computer)\b/i.test(lower)) {
            text = text.replace(/^(hey aios|aios|computer)\s*/i, '');
            if (!text) {
                await speak("I'm listening. What would you like me to do?", 'neutral');
                return;
            }
        }

        // Navigation
        if (/\b(next|continue|proceed)\b/i.test(lower)) {
            if (typeof eel !== 'undefined' && eel.next_step) {
                const step = await eel.next_step()();
                if (step) await speak(step.speech || step.description, step.emotion || 'neutral');
                else await speak("You've completed all setup steps.", 'happy');
            } else {
                await speak("Navigation is available in the setup wizard.", 'neutral');
            }
            return;
        }

        if (/\b(back|previous)\b/i.test(lower)) {
            if (typeof eel !== 'undefined' && eel.previous_step) {
                const step = await eel.previous_step()();
                if (step) await speak(step.speech || step.description, step.emotion || 'neutral');
            }
            return;
        }

        if (/\b(launch|start|begin|boot)\b/i.test(lower)) {
            await speak("Initiating AIOS kernel launch sequence.", 'excited');
            if (typeof eel !== 'undefined' && eel.launch_aios) {
                await eel.launch_aios()();
            }
            return;
        }

        if (/\b(status|system|stats)\b/i.test(lower)) {
            const cpuText = document.getElementById('cpu-val').textContent;
            const memText = document.getElementById('mem-val').textContent;
            await speak(`System status: CPU at ${cpuText}, memory at ${memText}. All systems operational.`, 'neutral');
            return;
        }

        if (/\b(hello|hi|greetings)\b/i.test(lower)) {
            await speak("Hello! I am your AIOS neural interface agent. How can I assist you?", 'happy');
            return;
        }

        if (/\b(who are you|what are you)\b/i.test(lower)) {
            await speak("I am the AIOS artificial intelligence agent. A neural interface designed to guide you through system setup and operations.", 'neutral');
            return;
        }

        // Default
        await speak(`Processing: "${text}". That command is not recognized yet. Try "status", "next", "back", or "launch".`, 'thinking');
    }

    // ── Command input ──
    document.getElementById('command-input').addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const text = e.target.value.trim();
            if (text) {
                e.target.value = '';
                await processVoiceCommand(text);
            }
        }
    });

    // ── UI Controls ──
    document.getElementById('palette-select').addEventListener('change', (e) => {
        if (!avatar) return;
        avatar.renderer.options.colorPalette = e.target.value;
        avatar.renderer.digitMesh.material.uniforms.uColorPalette.value =
            avatar.renderer.getColorPalette();
        if (avatar.renderer.rainPoints) {
            avatar.renderer.rainPoints.material.uniforms.uColor.value =
                avatar.renderer.getColorPalette();
        }
        logActivity('Palette: ' + e.target.value);
    });

    document.getElementById('activity-select').addEventListener('change', (e) => {
        if (!avatar) return;
        avatar.renderer.setActivity(e.target.value);
        document.getElementById('av-activity').textContent = e.target.value.toUpperCase();
        logActivity('Activity: ' + e.target.value);
    });

    document.getElementById('btn-speak').addEventListener('click', () => {
        const text = document.getElementById('speech-text').value.trim();
        if (text) speak(text);
    });

    document.getElementById('speech-text').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const text = e.target.value.trim();
            if (text) { speak(text); e.target.value = ''; }
        }
    });

    document.getElementById('btn-greet').addEventListener('click', () => {
        speak('Welcome to the Lo-Tek cyberspace interface. Neural link established.', 'happy');
    });

    document.getElementById('btn-glitch').addEventListener('click', () => {
        if (!avatar) return;
        avatar.renderer.setActivity('error');
        logActivity('Glitch triggered');
        setTimeout(() => avatar.renderer.setActivity('idle'), 1500);
    });

    let effectsOn = true;
    document.getElementById('btn-effects').addEventListener('click', (e) => {
        effectsOn = !effectsOn;
        e.target.textContent = effectsOn ? 'CRT Off' : 'CRT On';
        if (!avatar) return;
        avatar.renderer.options.enableCRT = effectsOn;
        avatar.renderer.options.enableChromatic = effectsOn;
        logActivity('CRT effects: ' + (effectsOn ? 'on' : 'off'));
    });

    document.getElementById('btn-demo').addEventListener('click', async () => {
        if (!avatar) return;
        logActivity('Running demo sequence...');

        avatar.setEmotion('happy');
        await speak('Initiating demonstration sequence. Observe the neural interface capabilities.', 'happy');
        await sleep(800);

        avatar.renderer.setActivity('thinking');
        document.getElementById('av-activity').textContent = 'THINKING';
        await speak('Processing binary data streams across synaptic pathways.', 'thinking');
        await sleep(1200);

        // Switch palette
        avatar.renderer.options.colorPalette = 'cyan';
        avatar.renderer.digitMesh.material.uniforms.uColorPalette.value =
            avatar.renderer.getColorPalette();
        if (avatar.renderer.rainPoints)
            avatar.renderer.rainPoints.material.uniforms.uColor.value = avatar.renderer.getColorPalette();
        document.getElementById('palette-select').value = 'cyan';

        avatar.setEmotion('excited');
        await speak('Neural interface recalibrated. Enhanced perception mode active.', 'excited');
        await sleep(1000);

        // Error flash
        avatar.renderer.setActivity('error');
        document.getElementById('av-activity').textContent = 'ERROR';
        await sleep(1200);

        // Recover
        avatar.renderer.options.colorPalette = 'matrix';
        avatar.renderer.digitMesh.material.uniforms.uColorPalette.value =
            avatar.renderer.getColorPalette();
        if (avatar.renderer.rainPoints)
            avatar.renderer.rainPoints.material.uniforms.uColor.value = avatar.renderer.getColorPalette();
        document.getElementById('palette-select').value = 'matrix';
        avatar.setEmotion('neutral');
        avatar.renderer.setActivity('idle');
        document.getElementById('av-activity').textContent = 'IDLE';

        await speak('Demonstration complete. All systems nominal. Standing by.', 'neutral');
        logActivity('Demo sequence complete');
    });

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ── Update HUD state display ──
    setInterval(() => {
        if (!avatar) return;
        document.getElementById('av-volume').textContent = avatar.renderer.state.volume.toFixed(2);
        document.getElementById('av-emotion').textContent = avatar.renderer.state.emotion.toUpperCase();
    }, 200);

    // ── Boot ──
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => { initAvatar(); initVoice(); });
    } else {
        initAvatar(); initVoice();
    }

    window.addEventListener('beforeunload', () => {
        if (avatar) avatar.destroy();
    });
</script>
</body>
</html>
