<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOS Onboarding - Binary Avatar</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/": "https://cdn.jsdelivr.net/npm/three@0.160.0/"
      }
    }
    </script>
    <style>
        /* Binary Avatar specific styles */
        #agent-avatar {
            position: relative;
            width: 100%;
            height: 500px;
            background: #000;
            border: 2px solid var(--primary-color, #0f0);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        #binary-avatar-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Hide video elements */
        #avatar-video {
            display: none;
        }

        /* Hide placeholder when avatar loads */
        #binary-avatar-container:not(:empty) ~ #avatar-placeholder {
            display: none !important;
        }

        #avatar-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 1.5rem;
            text-align: center;
        }

        /* Avatar status indicator */
        #avatar-status {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #0f0;
            padding: 5px 10px;
            font-size: 0.8rem;
            color: #0f0;
            z-index: 10;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
            background: #0f0;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>AIOS Setup Wizard</h1>
            <div id="progress-bar"></div>
        </header>
        <main>
            <div id="agent-avatar">
                <!-- Binary Avatar Container -->
                <div id="binary-avatar-container"></div>
                
                <!-- Status Indicator -->
                <div id="avatar-status">
                    <span class="status-dot"></span>
                    <span id="avatar-status-text">Initializing...</span>
                </div>
                
                <!-- Fallback for browsers without WebGL -->
                <div id="avatar-placeholder" style="display: none;">
                    🤖 AI Assistant (WebGL required)
                </div>
                
                <!-- Legacy video element (hidden) -->
                <video id="avatar-video" style="display: none;"></video>
            </div>
            <div id="onboarding-content">
                <!-- Onboarding steps will be dynamically loaded here -->
                <h2>Welcome to AIOS!</h2>
                <p>I am your personal AI Agent. Let's get you set up.</p>
                <button id="next-button">Next →</button>
            </div>
        </main>
    </div>

    <!-- Eel JavaScript bridge -->
    <script type="text/javascript" src="/eel.js"></script>
    
    <!-- Binary Avatar System (ES6 Modules) -->
    <script type="module">
        import { AvatarController } from './avatar-controller.js';

        // Global AIOS namespace
        window.AIOS = window.AIOS || {};

        // Initialize binary avatar
        async function initBinaryAvatar() {
            console.log('[AIOS] Initializing Binary Avatar...');
            
            const container = document.getElementById('binary-avatar-container');
            const statusText = document.getElementById('avatar-status-text');
            
            try {
                // Check for WebGL support
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                
                if (!gl) {
                    throw new Error('WebGL not supported');
                }

                // Detect mobile for performance optimization
                const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
                
                // Initialize avatar with appropriate settings
                window.AIOS.avatar = new AvatarController(container, {
                    colorPalette: 'matrix',
                    digitCount: isMobile ? 3000 : 6000, // Reduce for mobile
                    enableCRT: !isMobile,
                    enableChromatic: !isMobile,
                    enableBloom: true
                });

                statusText.textContent = 'Online';
                console.log('[AIOS] Binary Avatar initialized successfully');

                // Make avatar globally accessible for Eel callbacks
                window.speakText = async (text, emotion = 'neutral') => {
                    if (window.AIOS.avatar) {
                        await window.AIOS.avatar.speak(text, { emotion });
                    }
                };

                window.setAvatarActivity = (activity) => {
                    if (window.AIOS.avatar) {
                        window.AIOS.avatar.renderer.setActivity(activity);
                    }
                };

                window.setAvatarEmotion = (emotion) => {
                    if (window.AIOS.avatar) {
                        window.AIOS.avatar.setEmotion(emotion);
                    }
                };

                // Initial greeting after 1 second
                setTimeout(() => {
                    if (window.AIOS.avatar) {
                        window.AIOS.avatar.speak(
                            "Welcome to the AIOS setup wizard. I'm here to help you get started.",
                            { emotion: 'happy' }
                        );
                    }
                }, 1000);

            } catch (error) {
                console.error('[AIOS] Failed to initialize binary avatar:', error);
                statusText.textContent = 'Fallback Mode';
                document.getElementById('avatar-placeholder').style.display = 'block';
            }
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initBinaryAvatar);
        } else {
            initBinaryAvatar();
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (window.AIOS?.avatar) {
                window.AIOS.avatar.destroy();
            }
        });
    </script>

    <!-- Original AIOS Script -->
    <script type="text/javascript" src="script.js"></script>

    <!-- Enhanced Script for Binary Avatar Integration -->
    <script type="text/javascript">
        // Wait for the ES module above to define window.speakText etc.
        // before exposing them to Eel. Poll briefly since module init is async.
        function waitForAvatarFns() {
            if (typeof window.speakText === 'function' &&
                typeof window.setAvatarActivity === 'function' &&
                typeof window.setAvatarEmotion === 'function') {
                if (typeof eel !== 'undefined') {
                    eel.expose(window.speakText, 'speakText');
                    eel.expose(window.setAvatarActivity, 'setAvatarActivity');
                    eel.expose(window.setAvatarEmotion, 'setAvatarEmotion');
                    console.log('[AIOS] Avatar functions exposed to Eel');
                }
                setupEnhancedStepLoader();
            } else {
                setTimeout(waitForAvatarFns, 100);
            }
        }

        function setupEnhancedStepLoader() {
            const originalLoadStep = window.loadStep;
            window.loadStep = async function(stepData) {
                if (window.AIOS?.avatar) {
                    const emotionMap = {
                        'welcome': 'happy',
                        'configure': 'neutral',
                        'install': 'thinking',
                        'complete': 'excited',
                        'error': 'error'
                    };
                    const emotion = emotionMap[stepData.type] || 'neutral';
                    window.setAvatarEmotion(emotion);
                    if (stepData.speech) {
                        await window.speakText(stepData.speech, emotion);
                    }
                }
                if (originalLoadStep) {
                    return originalLoadStep(stepData);
                }
            };
        }

        waitForAvatarFns();
        console.log('[AIOS] Binary avatar integration loaded');
    </script>
</body>
</html>
